<svg viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stylized illustration of a benchtop FPGA instrument with a waveform display (Liquid Instruments Mako class)">
  <defs>
    <linearGradient id="bt-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2036"/><stop offset="1" stop-color="#050f1c"/>
    </linearGradient>
    <linearGradient id="bt-screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#02111f"/><stop offset="1" stop-color="#04162a"/>
    </linearGradient>
  </defs>
  <!-- chassis -->
  <rect x="34" y="58" width="372" height="184" rx="16" fill="url(#bt-body)" stroke="#39dfff" stroke-opacity=".45" stroke-width="1.5"/>
  <!-- vent lines top -->
  <g stroke="#a7c4d8" stroke-opacity=".25" stroke-width="2">
    <line x1="300" y1="74" x2="388" y2="74"/><line x1="300" y1="82" x2="388" y2="82"/><line x1="300" y1="90" x2="388" y2="90"/>
  </g>
  <!-- display screen -->
  <rect x="54" y="78" width="210" height="146" rx="8" fill="url(#bt-screen)" stroke="#39dfff" stroke-opacity=".55" stroke-width="1.5"/>
  <!-- grid -->
  <g stroke="#39dfff" stroke-opacity=".12" stroke-width="1">
    <line x1="54" y1="114" x2="264" y2="114"/><line x1="54" y1="151" x2="264" y2="151"/><line x1="54" y1="188" x2="264" y2="188"/>
    <line x1="106" y1="78" x2="106" y2="224"/><line x1="159" y1="78" x2="159" y2="224"/><line x1="212" y1="78" x2="212" y2="224"/>
  </g>
  <!-- waveform 1 (cyan) -->
  <path d="M58 178 C 90 178, 96 110, 122 110 S 150 178, 176 178 S 206 110, 232 110 262 150 262 150" fill="none" stroke="#39dfff" stroke-width="2.5"/>
  <!-- waveform 2 (violet, settled/locked) -->
  <path d="M58 151 H 110 C 128 151 128 140 150 140 S 176 151 210 151 H 262" fill="none" stroke="#9a63ff" stroke-width="2.5" stroke-opacity=".9"/>
  <!-- readout chip -->
  <text x="60" y="96" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#49f4c8">LOCKED</text>
  <!-- control panel right -->
  <!-- knob -->
  <circle cx="336" cy="132" r="30" fill="#04101e" stroke="#a7c4d8" stroke-opacity=".5" stroke-width="2"/>
  <circle cx="336" cy="132" r="30" fill="none" stroke="#39dfff" stroke-opacity=".5" stroke-width="2" stroke-dasharray="4 6"/>
  <line x1="336" y1="132" x2="336" y2="108" stroke="#39dfff" stroke-width="3" stroke-linecap="round"/>
  <!-- buttons -->
  <rect x="306" y="178" width="26" height="20" rx="4" fill="#04101e" stroke="#9a63ff" stroke-width="1.5"/>
  <rect x="340" y="178" width="26" height="20" rx="4" fill="#04101e" stroke="#39dfff" stroke-width="1.5"/>
  <!-- BNC ports (front bottom) -->
  <g>
    <circle cx="306" cy="216" r="9" fill="#0a2036" stroke="#e8c27a" stroke-width="2"/><circle cx="306" cy="216" r="3" fill="#e8c27a"/>
    <circle cx="336" cy="216" r="9" fill="#0a2036" stroke="#e8c27a" stroke-width="2"/><circle cx="336" cy="216" r="3" fill="#e8c27a"/>
    <circle cx="366" cy="216" r="9" fill="#0a2036" stroke="#39dfff" stroke-width="2"/><circle cx="366" cy="216" r="3" fill="#39dfff"/>
  </g>
  <!-- feet -->
  <rect x="70" y="242" width="30" height="8" rx="3" fill="#04101e"/>
  <rect x="340" y="242" width="30" height="8" rx="3" fill="#04101e"/>
</svg>
